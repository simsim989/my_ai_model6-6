<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Vision AI Dashboard by Parkjunseo</title>
    
    <style>
        /* 1. 하이엔드 다크 감성 및 전체 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #030712;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 2. 움직이는 배경 추상 그라데이션 (네온 오브 효과) */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
            animation: float-bg 20s infinite alternate;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.12) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 0;
            animation: float-bg 15s infinite alternate-reverse;
        }

        @keyframes float-bg {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* 3. 메인 레이아웃 홀더 */
        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 4. 고해상도 타이틀 섹션 */
        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 30%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 5. 테크노 트렌디 글로우 버튼 */
        .premium-btn {
            background: #fff;
            color: #030712;
            border: none;
            padding: 18px 48px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
        }

        .premium-btn:hover {
            transform: translateY(-4px);
            background: linear-gradient(90deg, #6366f1, #ec4899);
            color: #fff;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        /* 6. 애플 감성 글래스모피즘 메인 대시보드 */
        .glass-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 32px;
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 768px) {
            .glass-grid { grid-template-columns: 1fr; }
        }

        /* 7. 미디어 슬롯 (왼쪽 카메라 존) */
        .view-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #090d16;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: rotateY(180deg);
        }

        /* 스캔 레이저 애니메이션 선 */
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            animation: scan 3s linear infinite;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* 8. 데이터 차트 슬롯 (오른쪽 스코어 보드) */
        .data-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100%;
            justify-content: center;
        }

        /* 고급 리스트 카드 */
        .metric-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 90% 이상 활성화 상태일 때의 미친 비주얼 */
        .metric-card.super-active {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(99, 102, 241, 0.08);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.15);
        }

        .metric-card.super-active .bar-fill {
            background: linear-gradient(90deg, #6366f1 0%, #ec4899 100%);
            box-shadow: 0 0 20px #ec4899;
        }

        .metric-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .metric-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .super-active .metric-title {
            color: #fff;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: 800;
            font-family: monospace;
            color: #64748b;
            transition: color 0.3s;
        }

        .super-active .metric-value {
            color: #ec4899;
        }

        /* 미니멀 네온 트랙 바 */
        .track-bar {
            width: 100%;
            height: 8px;
            background: #0f172a;
            border-radius: 99px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: #334155;
            border-radius: 99px;
            transition: width 0.2s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="brand-header">
            <div class="brand-badge">Next-Gen Interface</div>
            <h1>Hyper Vision AI</h1>
        </div>
        
        <button class="premium-btn" type="button" onclick="init()">엔진 초기화 & 가동</button>
        
        <div class="glass-grid">
            
            <div class="view-panel">
                <div class="panel-label">// Camera Stream</div>
                <div class="camera-wrapper">
                    <div class="scanner-line"></div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
            
            <div class="data-panel">
                <div class="panel-label">// Neural Metrics</div>
                <div id="label-container">
                    <div class="metric-card" style="text-align: center; color: #4b5563; padding: 40px 0;">
                        카메라를 켜면 실시간 데이터 연동이 시작됩니다.
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/4kLAML5do/";
        let model, webcam, ctx, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const size = 400; // 해상도 향상
            const flip = true; 
            webcam = new tmPose.Webcam(size, size, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            const canvas = document.getElementById("canvas");
            canvas.width = size; canvas.height = size;
            ctx = canvas.getContext("2d");
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            
            for (let i = 0; i < maxPredictions; i++) { 
                const card = document.createElement("div");
                card.className = "metric-card";
                card.innerHTML = `
                    <div class="metric-meta">
                        <span class="metric-title">Calculating...</span>
                        <span class="metric-value">0%</span>
                    </div>
                    <div class="track-bar">
                        <div class="bar-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(card);
            }
        }

        async function loop(timestamp) {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percent = Math.round(probability * 100); 

                const card = labelContainer.childNodes[i];
                if(card && card.querySelector) {
                    card.querySelector(".metric-title").innerText = className;
                    card.querySelector(".metric-value").innerText = percent + "%";
                    card.querySelector(".bar-fill").style.width = percent + "%";
                    
                    // 핵심 초강조 연출: 특정 포즈 매칭률이 85%를 돌파하면 완전 화려한 상태(super-active) 부여
                    if (percent >= 85) {
                        card.classList.add("super-active");
                    } else {
                        card.classList.remove("super-active");
                    }
                }
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    // 티처블 스켈레톤 드로잉 기본선 색상 조정
                    ctx.strokeStyle = "#6366f1";
                    ctx.lineWidth = 4;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
